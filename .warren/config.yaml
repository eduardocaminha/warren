# .warren/config.yaml — per-project warren defaults (warren-5840 layout).
#
# Supersedes the legacy .warren/defaults.json. All fields are optional.
# See SPEC §11.H for the schema. Every key here matches DefaultsConfigSchema
# in src/warren-config/schema.ts.
#
# Precedence at spawn time: operator override (per-run) > project default
# (this file) > agent frontmatter > built-in.

# ── Active defaults ─────────────────────────────────────────────────────
# These were migrated from .warren/defaults.json. Edit freely.

defaultRole: claude-code
defaultBranch: main
defaultProvider: anthropic

# Override do runtime dos built-ins interativos. O planner e dispatchado
# one-shot (send-off / conversation-merge-dispatch.ts), entao claude-code
# (subscription/OAuth) roda ele sem queimar credito de API, em vez do pi
# (API). Remover este bloco volta pro pi.
interactiveAgents:
  plannerRuntime: claude-code

# CI-fixer (src/ci-fixer/): each scheduler tick warren polls this project's
# own failing PRs and dispatches the fixer on the PR branch to repair CI.
# DISABLED 2026-06-30: even on v0.9.8 the fixer run gets targetBranch=None and
# spawn_fails with `git worktree add -b <existing-PR-branch> ... main` (CREATE
# collision). warren-a993 is NOT effective here — the worktree-add (burrow side)
# doesn't checkout an existing branch, so the ci-fixer can NEVER push to a PR
# branch on this stack. Left ON it loops ~1 dispatch/min/red-PR (60+ dead runs).
# Keep OFF until the burrow worktree-add is fixed to checkout existing branches.
ciFixer:
  enabled: false
  role: cam-pr-fixer
  maxRetries: 10
  cooldownMinutes: 5

# ── Optional knobs (uncomment to set) ───────────────────────────────────

# Pre-fills the NewRun UI prompt textarea and is used as the prompt for
# scheduled runs that don't carry their own. Free-form multi-line ok.
# defaultPrompt: |
#   Read the seed, plan in <= 5 steps, execute, push a branch.

# Prefix for the burrow branch warren passes to `burrows.up`. The full
# branch is `<runBranchPrefix>/<run.id>` (e.g. warren/run_abc123).
# Must be kebab/snake-case (lowercase, digits, dots, dashes, underscores;
# no slashes). Precedence: this field > WARREN_RUN_BRANCH_PREFIX env >
# built-in "burrow".
runBranchPrefix: warren

# Canonical green-tree command for this repo. Surfaced to agents via
# $WARREN_QUALITY_GATE (composeRunEnv in src/runs/spawn.ts) so the
# built-in claude-code / sapling / pi prompts don't fall back to the
# fuzzy "look for it in CLAUDE.md" heuristic. Must mirror CI — see
# warren-57cd / pl-da5b step 4 and AGENTS.md "Quality gates".
qualityGate: bun run check:all

# Per-run preview environment. CANONICAL home is .warren/preview.yaml
# (top-level document = the preview block itself). The nested form below
# is still accepted here for smooth migration; preview.yaml wins on
# conflict. See preview.yaml in this dir for a fully-documented stub.
# preview:
#   type: server          # only 'server' implemented in V1; 'static' deferred
#   mode: path            # 'path' | 'subdomain'  (operator WARREN_PREVIEW_MODE wins)
#   command: bun run dev
#   port: 3000
#   readiness_path: /healthz
#   idle_ttl: 30m         # <number><unit> pairs, units: ms, s, m, h, d
#   max_lifetime: 8h
