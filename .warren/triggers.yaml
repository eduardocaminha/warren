# .warren/triggers.yaml — scheduled runs for this project (SPEC §11.I, R-06).
#
# Each entry is a cron-style trigger. Warren ticks once a minute and
# spawns a run when a trigger is due. Today only `kind: cron` is
# implemented; the `kind:` discriminator leaves room for future
# webhook-style triggers without a breaking schema rev.
#
# Required fields: id, kind, cron, role.
# Optional fields: seed, timezone (default UTC), prompt.
#
# Field rules (TriggersConfigSchema in src/warren-config/schema.ts):
#   id        kebab/snake-case (lowercase, digits, dots, dashes, _). Unique.
#   kind      'cron'
#   cron      5 or 6 whitespace-separated fields (croner-compatible)
#   seed      seed id the agent reads + writes (e.g. warren-xxxx)
#   role      registered agent name (kebab/snake-case)
#   timezone  IANA tz name, e.g. America/Sao_Paulo
#   prompt    pre-filled into the agent; multi-line ok via `|`
#
# Example (uncomment to enable):
#
# - id: nightly-housekeeping
#   kind: cron
#   cron: '0 3 * * *'          # 03:00 daily
#   seed: warren-housekeep
#   role: claude-code
#   timezone: America/Sao_Paulo
#   prompt: |
#     Run the housekeeping checklist and file seeds for anything off.

- id: nightwatch-patrol
  kind: cron
  cron: '0 0 * * *'
  role: cam-nightwatch
  timezone: America/Sao_Paulo
  prompt: |
    Scan this repo for quality issues. Follow your procedure exactly.
    Today's date is {{date}}. If you find issues, file a plan. If the
    codebase is clean, report clean and exit.

- id: bugwatch-triage
  kind: cron
  cron: '0 4 * * 0,3'
  role: cam-bugwatch
  timezone: America/Sao_Paulo
  prompt: |
    Triage open bug seeds and plan fixes. Follow your procedure exactly.
    Today's date is {{date}}. If no bugs qualify, report clean and exit.

# Audit population (docs/CONSTITUTION.md). gatewatch + ratchetwatch are
# mechanical auditors with plan+dispatch authority (auto_plan_run);
# tastewatch is the report-only taste auditor — its weekly digest seed is
# the human's five-minute calibration read. Article IX: changes to these
# entries require explicit human review.

- id: gatewatch-patrol
  kind: cron
  cron: '0 1 * * *'
  role: cam-gatewatch
  timezone: America/Sao_Paulo
  prompt: |
    Audit the last 36 hours of merged history for gate-integrity
    violations per docs/CONSTITUTION.md. Follow your procedure exactly.
    Today's date is {{date}}. Dedupe against open audit seeds before
    filing. Deliver each finding to the standing warden conversation
    (well-known title "Audit Warden") over POST /conversations/:id/messages
    in addition to filing the seed — the existing 202 steering channel, no
    new endpoint or dispatch path. If the window is clean, report clean
    and exit.

- id: ratchetwatch-patrol
  kind: cron
  cron: '0 2 * * *'
  role: cam-ratchetwatch
  timezone: America/Sao_Paulo
  prompt: |
    Measure ratchet slack (coverage floors, grandfather lists, bundle
    creep, debt markers) per docs/CONSTITUTION.md Article II and plan
    mechanical tightenings only. Follow your procedure exactly. Today's
    date is {{date}}. Deliver each finding to the standing warden
    conversation (well-known title "Audit Warden") over
    POST /conversations/:id/messages in addition to filing the seed/plan
    — the existing 202 steering channel, no new endpoint or dispatch path.
    If everything is tight, report tight and exit.

- id: tastewatch-digest
  kind: cron
  cron: '0 3 * * 0'
  role: cam-tastewatch
  timezone: America/Sao_Paulo
  prompt: |
    Produce the weekly taste digest: stratified sample of the week's
    merged commits judged against docs/CONSTITUTION.md, auditor
    precision table, divergence trend, at most one proposed amendment.
    Exactly one digest seed. Deliver the digest to the standing warden
    conversation (well-known title "Audit Warden") over
    POST /conversations/:id/messages — the existing 202 steering channel,
    report-only, no dispatch or new path. Today's date is {{date}}.

- id: syncwatch-reconcile
  kind: cron
  cron: '0 5 * * *'
  role: cam-syncwatch
  timezone: America/Sao_Paulo
  prompt: |
    Reconcile this repo against its jaymin upstream. Follow your procedure
    exactly. Today's date is {{date}}. Cherry-pick candidates only, never a
    full merge. Produce the digest seed + the Sync Warden message, and
    propose an sd plan for the cherry-picks (do not dispatch it). If the
    fork is in sync, report in sync and exit.

- id: contribwatch-suggest
  kind: cron
  cron: '0 7 * * *'
  role: cam-contribwatch
  timezone: America/Sao_Paulo
  prompt: |
    Scout this fork for work worth contributing back to the jaymin upstream.
    Follow your procedure exactly. Today's date is {{date}}. Read the upstream
    CONTRIBUTING.md and draft suggestions (issue or PR) for the human to file;
    never open anything on jaymin's repo yourself. Digest seed + Upstream
    Warden message. If nothing, report nothing to contribute and exit.

- id: securitywatch-scan
  kind: cron
  cron: '0 6 * * *'
  role: cam-securitywatch
  timezone: America/Sao_Paulo
  prompt: |
    Scan code shared with the jaymin upstream for security concerns. Follow
    your procedure exactly. Today's date is {{date}}. Follow the upstream
    SECURITY.md: private disclosure only, never a public issue or seed. Draft
    the advisory only to the Security Warden conversation. If nothing, say so
    there and exit.
