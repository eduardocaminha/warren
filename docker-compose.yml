# Warren home-server compose file (SPEC §10.1).
#
# `docker compose up -d` boots a single warren container with:
#   - the four bwrap-friendly security flags (SPEC §5.3 / mx-94901b /
#     mx-c085ba). They relax the outer container so burrow's nested
#     userns sandboxes can come up.
#   - a named volume mounted at /data for warren.db, the canopy clone,
#     and cloned project repos.
#   - the runtime env loaded from .env (`cp .env.example .env` first).
#
# The supervisor inside the container spawns `burrow serve` and `warren`
# as siblings — there is no separate burrow service in compose. See
# SPEC §10.3 for the supervisor contract and src/supervisor/main.ts for
# the implementation.

services:
  warren:
    build:
      context: .
      dockerfile: Dockerfile
    image: warren:local
    container_name: warren
    restart: unless-stopped

    # Required for nested bwrap (SPEC §5.3, mx-94901b/mx-c085ba). Remove
    # any one of these and `burrow up` fails inside the container.
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      - systempaths=unconfined
    cap_add:
      - SYS_ADMIN

    ports:
      - "8080:8080"

    env_file:
      - .env

    volumes:
      - warren_data:/data
      # Local-dev bind mount so warren can clone a host-side canopy repo
      # via `CANOPY_REPO_URL=file:///canopy-source`. Read-only — warren
      # only ever reads from this path; clones land under /data.
      # Set CANOPY_SOURCE_DIR in .env (host path to a real canopy repo).
      - ${CANOPY_SOURCE_DIR}:/canopy-source:ro

volumes:
  warren_data:
